# Build the handheld cart player as fully-static musl binaries for
# aarch64/armv7 devices (PowKiddy RGB10S, Anbernic RG351/353, ...) on
# every push to main and on pull requests, smoke-test the same code on
# the host, and upload a ready-to-copy ports bundle as an artifact.

name: build handheld player

on:
  workflow_dispatch:
  release:

permissions:
  contents: read

jobs:
  handheld:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl,armv7-unknown-linux-musleabihf,wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # ALSA headers for the cpal audio used by the console and the windowed player.
      - name: Install ALSA headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      # Debug builds: this host run only smoke-tests that the player and the
      # exporter work; the shipped handheld binaries are the static musl
      # --release cross-builds below. Reusing the debug artifacts `cargo test`
      # just compiled keeps this step fast.
      - name: Host smoke test
        run: |
          cargo test -p pixel8-player
          cargo build -p pixel8-player
          cargo build -p pixel8-console --no-default-features
          ./target/debug/pixel8 export examples/platformer /tmp/platformer.png
          ./target/debug/pixel8-player --smoke 60 /tmp/platformer.png

      - name: Cross-build the static musl ports bundle
        run: ./.github/build-handheld.sh dist/handheld

      - name: Add the example carts to the bundle
        run: ./.github/build-example-carts.sh dist/handheld/pixel8/carts

      - uses: actions/upload-artifact@v4
        with:
          name: pixel8-handheld
          path: dist/handheld
