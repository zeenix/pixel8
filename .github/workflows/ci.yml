# Run the test suite, rustfmt, and clippy on every push to main and on
# pull requests, so formatting and lints stay green before merge.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # .rustfmt.toml uses nightly-only options (wrap_comments,
      # imports_granularity), so formatting runs on nightly.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt
      - run: cargo fmt --all -- --check
      - name: Check formatting of the example carts
        run: |
          fail=0
          for d in examples/*/; do
            [ -f "$d/Cargo.toml" ] || continue
            echo "::group::fmt $d"
            (cd "$d" && cargo fmt --all -- --check) || fail=1
            echo "::endgroup::"
          done
          exit $fail

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      # ALSA headers for the cpal audio used by the console and the windowed player.
      - name: Install ALSA headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy -p pixel8-player --no-default-features --features kms --all-targets -- -D warnings
      - name: Clippy the example carts
        run: |
          fail=0
          for d in examples/*/; do
            [ -f "$d/Cargo.toml" ] || continue
            echo "::group::clippy $d"
            (cd "$d" && cargo clippy -- -D warnings) || fail=1
            echo "::endgroup::"
          done
          exit $fail

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The cart-build tests run `cargo build --target
      # wasm32-unknown-unknown`, so that target's std must be present.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      # ALSA headers for the cpal audio used by the console and the windowed player.
      - name: Install ALSA headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - run: cargo test --workspace
      - run: cargo test -p pixel8-player --no-default-features --features kms

  book:
    runs-on: ubuntu-latest
    # The tutorial book deploys to GitHub Pages from main
    # (.github/workflows/deploy-site.yml); build it here so a broken book
    # is caught before merge.
    steps:
      - uses: actions/checkout@v4
      - name: Install latest mdbook
        run: |
          tag=$(curl -sS 'https://api.github.com/repos/rust-lang/mdbook/releases/latest' | jq -r '.tag_name')
          url="https://github.com/rust-lang/mdbook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir mdbook
          curl -sSL "$url" | tar -xz --directory=./mdbook
          echo "$(pwd)/mdbook" >> "$GITHUB_PATH"
      - run: mdbook build book

  doc:
    runs-on: ubuntu-latest
    # Fail on any rustdoc warning (e.g. a broken intra-doc link) so the SDK and
    # runtime documentation stays clean.
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # pixel8-runtime's default `audio` feature links ALSA via cpal, so its docs
      # need the headers just like the clippy and test jobs.
      - name: Install ALSA headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      # --no-deps keeps the gate on our own docs: a noisy dependency must not
      # trip -D warnings.
      - run: cargo doc --no-deps --all-features -p pixel8
      - run: cargo doc --no-deps --all-features -p pixel8-runtime
