# `cargo console` boots Pixel8; `cargo tui` boots it in the terminal.
# The `-p` matters: selecting the package keeps cargo's feature unification
# from building the other frontend's stack (e.g. `cargo run --bin
# pixel8-tui` at the workspace root would compile wgpu/winit too).
[alias]
console = "run --release -p pixel8-console"
tui = "run --release -p pixel8-tui"

# Handheld player builds as fully-static musl binaries (see docs/HANDHELD.md). rust-lld +
# self-contained linking needs no cross-gcc, no zig, no Docker.
[target.aarch64-unknown-linux-musl]
linker = "rust-lld"
rustflags = ["-C", "link-self-contained=yes", "-C", "strip=symbols"]

[target.armv7-unknown-linux-musleabihf]
linker = "rust-lld"
rustflags = ["-C", "link-self-contained=yes", "-C", "strip=symbols"]
